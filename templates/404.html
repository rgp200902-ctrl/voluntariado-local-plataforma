{% extends 'base.html' %}
{% block title %}Página não encontrada{% endblock %}
{% block content %}
<div class="container py-6">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="empty-state-icon" style="color:var(--color-warning);">
                <i class="bi bi-exclamation-triangle" style="font-size:5rem;" aria-hidden="true"></i>
            </div>
            <h1 class="h1" style="font-size:4rem;color:var(--color-text-muted);">404</h1>
            <h2 class="h2 mb-3">Página não encontrada</h2>
            <p class="text-muted mb-5">Pedimos desculpa, mas a página que procuras não existe ou foi movida.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'core:home' %}" class="btn btn-primary">
                    <i class="bi bi-house" aria-hidden="true"></i>
                    Voltar à Página Inicial
                </a>
                <a href="{% url 'oportunidades:list' %}" class="btn btn-secondary">
                    <i class="bi bi-search" aria-hidden="true"></i>
                    Ver Oportunidades
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
