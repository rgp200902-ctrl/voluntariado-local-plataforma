{% extends 'base.html' %}
{% block title %}Página não encontrada{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle" style="font-size:6rem;color:#ffc107;"></i>
            </div>
            <h1 class="display-1 fw-bold text-muted">404</h1>
            <h3 class="fw-bold mb-3">Página não encontrada</h3>
            <p class="text-muted mb-4">Pedimos desculpa, mas a página que procuras não existe ou foi movida.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'core:home' %}" class="btn btn-primary px-4 py-2 fw-bold">
                    <i class="bi bi-house me-1"></i>Voluntar à Página Inicial
                </a>
                <a href="{% url 'oportunidades:list' %}" class="btn btn-outline-primary px-4 py-2">
                    <i class="bi bi-search me-1"></i>Ver Oportunidades
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
