<div class="list-group list-group-flush">
    <a href="{% url 'accounts:admin_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'accounts:admin_oportunidades' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_oportunidades' or request.resolver_match.url_name == 'admin_aprovar_oportunidade' %}active{% endif %}">
        <i class="bi bi-megaphone"></i> Oportunidades
        {% if pendentes_count is None %}{% else %}{% endif %}
    </a>
    <a href="{% url 'accounts:admin_users' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
        <i class="bi bi-people"></i> Utilizadores
    </a>
    <a href="{% url 'accounts:admin_institutions' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_institutions' %}active{% endif %}">
        <i class="bi bi-building"></i> Instituições
    </a>
    <a href="{% url 'accounts:admin_categories' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_categories' %}active{% endif %}">
        <i class="bi bi-tags"></i> Categorias
    </a>
    <a href="{% url 'accounts:gerir_tags' %}" class="sidebar-link {% if request.resolver_match.url_name == 'gerir_tags' %}active{% endif %}">
        <i class="bi bi-bookmark"></i> Tags
    </a>
    <a href="{% url 'core:impacto' %}" class="sidebar-link {% if request.resolver_match.url_name == 'impacto' %}active{% endif %}">
        <i class="bi bi-graph-up"></i> Impacto
    </a>
    <a href="{% url 'accounts:admin_reports' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">
        <i class="bi bi-file-earmark-bar-graph"></i> Relatórios
    </a>
    <a href="{% url 'accounts:notificacoes' %}" class="sidebar-link {% if request.resolver_match.url_name == 'notificacoes' %}active{% endif %}">
        <i class="bi bi-bell"></i> Notificações
        {% if notificacoes_nao_lidas > 0 %}<span class="badge bg-danger ms-auto">{{ notificacoes_nao_lidas }}</span>{% endif %}
    </a>
</div>
