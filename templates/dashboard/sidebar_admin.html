<aside class="sidebar" id="sidebar" role="navigation" aria-label="Navegação do painel">
    <div class="sidebar-section-label">Administração</div>
    <a href="{% url 'accounts:admin_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2 sidebar-link-icon" aria-hidden="true"></i>
        Dashboard
    </a>
    <a href="{% url 'accounts:admin_oportunidades' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_oportunidades' or request.resolver_match.url_name == 'admin_aprovar_oportunidade' %}active{% endif %}">
        <i class="bi bi-megaphone sidebar-link-icon" aria-hidden="true"></i>
        Oportunidades
        {% if pendentes_count %}
        <span class="sidebar-link-badge status-badge status-warning">{{ pendentes_count }}</span>
        {% endif %}
    </a>
    <a href="{% url 'accounts:admin_users' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
        <i class="bi bi-people sidebar-link-icon" aria-hidden="true"></i>
        Utilizadores
    </a>
    <a href="{% url 'accounts:admin_institutions' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_institutions' %}active{% endif %}">
        <i class="bi bi-building sidebar-link-icon" aria-hidden="true"></i>
        Instituições
    </a>
    <a href="{% url 'accounts:admin_categories' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_categories' %}active{% endif %}">
        <i class="bi bi-tags sidebar-link-icon" aria-hidden="true"></i>
        Categorias
    </a>
    <a href="{% url 'accounts:gerir_tags' %}" class="sidebar-link {% if request.resolver_match.url_name == 'gerir_tags' %}active{% endif %}">
        <i class="bi bi-bookmark sidebar-link-icon" aria-hidden="true"></i>
        Tags
    </a>
    <a href="{% url 'accounts:admin_reports' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">
        <i class="bi bi-file-earmark-bar-graph sidebar-link-icon" aria-hidden="true"></i>
        Relatórios
    </a>
    <div class="sidebar-section-label">Comunidade</div>
    <a href="{% url 'core:impacto' %}" class="sidebar-link {% if request.resolver_match.url_name == 'impacto' %}active{% endif %}">
        <i class="bi bi-graph-up sidebar-link-icon" aria-hidden="true"></i>
        Impacto
    </a>
    <a href="{% url 'accounts:notificacoes' %}" class="sidebar-link {% if request.resolver_match.url_name == 'notificacoes' %}active{% endif %}">
        <i class="bi bi-bell sidebar-link-icon" aria-hidden="true"></i>
        Notificações
        {% if notificacoes_nao_lidas > 0 %}
        <span class="sidebar-link-badge status-badge status-error">{{ notificacoes_nao_lidas }}</span>
        {% endif %}
    </a>
</aside>
<div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>
