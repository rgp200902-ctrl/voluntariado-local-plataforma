<div class="list-group list-group-flush">
    <a href="{% url 'accounts:volunteer_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'volunteer_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'accounts:volunteer_profile' %}" class="sidebar-link {% if request.resolver_match.url_name == 'volunteer_profile' %}active{% endif %}">
        <i class="bi bi-person"></i> Perfil
    </a>
    <a href="{% url 'accounts:volunteer_registrations' %}" class="sidebar-link {% if request.resolver_match.url_name == 'volunteer_registrations' %}active{% endif %}">
        <i class="bi bi-card-list"></i> Inscrições
    </a>
    <a href="{% url 'oportunidades:favoritos' %}" class="sidebar-link {% if request.resolver_match.url_name == 'favoritos' %}active{% endif %}">
        <i class="bi bi-heart-fill"></i> Favoritos
    </a>
    <a href="{% url 'accounts:voluntario_tags' %}" class="sidebar-link {% if request.resolver_match.url_name == 'voluntario_tags' %}active{% endif %}">
        <i class="bi bi-bookmark"></i> Tags
    </a>
    <a href="{% url 'core:impacto' %}" class="sidebar-link {% if request.resolver_match.url_name == 'impacto' %}active{% endif %}">
        <i class="bi bi-graph-up"></i> Impacto
    </a>
    <a href="{% url 'accounts:notificacoes' %}" class="sidebar-link {% if request.resolver_match.url_name == 'notificacoes' %}active{% endif %}">
        <i class="bi bi-bell"></i> Notificações
        {% if notificacoes_nao_lidas > 0 %}<span class="badge bg-danger ms-auto">{{ notificacoes_nao_lidas }}</span>{% endif %}
    </a>
    <a href="{% url 'accounts:volunteer_history' %}" class="sidebar-link {% if request.resolver_match.url_name == 'volunteer_history' %}active{% endif %}">
        <i class="bi bi-clock-history"></i> Histórico
    </a>
</div>
