{% extends 'base.html' %}
{% block title %}Avaliar Oportunidade{% endblock %}
{% block content %}
<div class="dashboard-layout">
    {% include 'dashboard/sidebar_volunteer.html' %}
    <div class="dashboard-content">
        <div class="page-header">
            <div>
                <h1 class="page-header-title">Avaliar Oportunidade</h1>
                <p class="page-header-description">{{ oportunidade.titulo }}</p>
            </div>
        </div>

        <div class="card" style="max-width:500px;">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="form-label" for="classificacao">Classificação</label>
                        <div class="d-flex gap-2" id="classificacao" role="radiogroup" aria-label="Classificação">
                            {% for i in "12345" %}
                            <label class="form-check" style="cursor:pointer;font-size:1.5rem;">
                                <input type="radio" name="classificacao" value="{{ i }}" class="form-check-input" style="display:none;" onchange="document.querySelectorAll('.star-rating').forEach(function(el){el.style.color='var(--color-text-muted)'});this.parentElement.querySelector('.star-rating').style.color='var(--color-warning)'">
                                <span class="star-rating" style="color:{% if forloop.first %}var(--color-warning){% else %}var(--color-text-muted){% endif %};">&#9733;</span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="comentario">Comentário <span class="text-muted" style="font-weight:400;">(opcional)</span></label>
                        <textarea name="comentario" id="comentario" class="form-textarea" rows="4" placeholder="Partilha a tua experiência..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submeter Avaliação</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
