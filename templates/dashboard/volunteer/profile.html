{% extends 'base.html' %}
{% block title %}Meu Perfil{% endblock %}
{% block content %}
<div class="dashboard-layout">
    {% include 'dashboard/sidebar_volunteer.html' %}
    <div class="dashboard-content">
        <div class="page-header">
            <div>
                <h1 class="page-header-title">O Meu Perfil</h1>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" autocomplete="on">
                    {% csrf_token %}
                    <div class="text-center mb-5">
                        {% if volunteer.avatar %}
                        <img src="{{ volunteer.avatar.url }}" alt="Foto de perfil" class="navbar-avatar" style="width:6rem;height:6rem;border:3px solid var(--color-primary);">
                        {% else %}
                        <div class="navbar-avatar-placeholder" style="width:6rem;height:6rem;font-size:2rem;margin:0 auto;">{{ user.get_full_name|default:user.email|first|upper }}</div>
                        {% endif %}
                        <div class="mt-2">
                            <label for="avatar" class="btn btn-secondary btn-sm" style="cursor:pointer;">
                                <i class="bi bi-camera" aria-hidden="true"></i>
                                Alterar Foto
                            </label>
                            <input type="file" name="avatar" id="avatar" accept="image/*" class="d-none">
                        </div>
                    </div>

                    <div class="form-row form-row-2">
                        <div class="form-group">
                            <label class="form-label" for="first_name">Nome</label>
                            <input type="text" name="first_name" id="first_name" class="form-input" value="{{ user.first_name }}" autocomplete="given-name">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-input" value="{{ user.email }}" disabled>
                        </div>
                    </div>
                    <div class="form-row form-row-2">
                        <div class="form-group">
                            <label class="form-label" for="telefone">Telefone</label>
                            <input type="tel" name="telefone" id="telefone" class="form-input" value="{{ volunteer.telefone|default:'' }}" autocomplete="tel">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="localidade">Localidade</label>
                            <input type="text" name="localidade" id="localidade" class="form-input" value="{{ volunteer.localidade|default:'' }}" autocomplete="address-level2">
                        </div>
                    </div>
                    <div class="form-row form-row-2">
                        <div class="form-group">
                            <label class="form-label" for="data_nascimento">Data de Nascimento</label>
                            <input type="date" name="data_nascimento" id="data_nascimento" class="form-input" value="{% if volunteer.data_nascimento %}{{ volunteer.data_nascimento|date:'Y-m-d' }}{% endif %}" autocomplete="bday">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="faixa_etaria">Faixa Etária</label>
                            <select name="faixa_etaria" id="faixa_etaria" class="form-select">
                                <option value="">Seleciona...</option>
                                <option value="<18" {% if volunteer.faixa_etaria == '<18' %}selected{% endif %}>Menos de 18</option>
                                <option value="18-25" {% if volunteer.faixa_etaria == '18-25' %}selected{% endif %}>18-25 anos</option>
                                <option value="26-35" {% if volunteer.faixa_etaria == '26-35' %}selected{% endif %}>26-35 anos</option>
                                <option value="36-50" {% if volunteer.faixa_etaria == '36-50' %}selected{% endif %}>36-50 anos</option>
                                <option value="50+" {% if volunteer.faixa_etaria == '50+' %}selected{% endif %}>Mais de 50</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="disponibilidade">Disponibilidade</label>
                        <textarea name="disponibilidade" id="disponibilidade" class="form-textarea" rows="2">{{ volunteer.disponibilidade|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Alterações</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
