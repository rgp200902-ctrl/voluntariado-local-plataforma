{% extends 'base.html' %}
{% block title %}Perfil Instituição{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-3">{% include 'dashboard/sidebar_institution.html' %}</div>
        <div class="col-md-9">
            <h3 class="fw-bold mb-4">Perfil da Instituição</h3>
            <div class="card dashboard-card">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label">Nome</label><input type="text" name="nome" class="form-control" value="{{ institution.nome }}"></div>
                            <div class="col-md-6 mb-3"><label class="form-label">NIF</label><input type="text" name="nif" class="form-control" value="{{ institution.nif|default:'' }}"></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label">Tipo</label>
                                <select name="tipo" class="form-select">
                                    <option value="">Seleciona...</option>
                                    <option value="ipss" {% if institution.tipo == 'ipss' %}selected{% endif %}>IPSS</option>
                                    <option value="ong" {% if institution.tipo == 'ong' %}selected{% endif %}>ONG</option>
                                    <option value="associacao" {% if institution.tipo == 'associacao' %}selected{% endif %}>Associação</option>
                                    <option value="fundacao" {% if institution.tipo == 'fundacao' %}selected{% endif %}>Fundação</option>
                                    <option value="outro" {% if institution.tipo == 'outro' %}selected{% endif %}>Outro</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3"><label class="form-label">Telefone</label><input type="text" name="telefone" class="form-control" value="{{ institution.telefone|default:'' }}"></div>
                        </div>
                        <div class="mb-3"><label class="form-label">Morada</label><input type="text" name="morada" class="form-control" value="{{ institution.morada|default:'' }}"></div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label">Pessoa de Contacto</label><input type="text" name="pessoa_contacto" class="form-control" value="{{ institution.pessoa_contacto|default:'' }}"></div>
                            <div class="col-md-6 mb-3"><label class="form-label">Website</label><input type="url" name="website" class="form-control" value="{{ institution.website|default:'' }}"></div>
                        </div>
                        <div class="mb-3"><label class="form-label">Descrição</label><textarea name="descricao" class="form-control" rows="3">{{ institution.descricao|default:'' }}</textarea></div>
                        <div class="mb-3"><span class="badge bg-{% if institution.estado_validacao == 'aprovada' %}success{% elif institution.estado_validacao == 'pendente' %}warning{% else %}danger{% endif %}">{{ institution.get_estado_validacao_display }}</span></div>
                        <button type="submit" class="btn btn-primary px-4">Guardar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
