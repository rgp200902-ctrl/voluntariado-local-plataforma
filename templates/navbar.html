<nav class="navbar" role="navigation" aria-label="Navegação principal">
    <div class="navbar-inner">
        <div class="d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
            <button id="sidebarToggle" class="icon-btn" aria-label="Alternar menu" aria-expanded="true" type="button">
                <i class="bi bi-list" aria-hidden="true"></i>
            </button>
            {% endif %}
            <a class="navbar-brand" href="{% if user.is_authenticated %}{% if user.perfil == 'voluntario' %}{% url 'accounts:volunteer_dashboard' %}{% elif user.perfil == 'instituicao' %}{% url 'accounts:institution_dashboard' %}{% elif user.perfil == 'administrador' %}{% url 'accounts:admin_dashboard' %}{% else %}{% url 'core:home' %}{% endif %}{% else %}{% url 'core:home' %}{% endif %}">
                <i class="bi bi-people-fill navbar-brand-icon" aria-hidden="true"></i>
                Voluntariado Local
            </a>
        </div>

        <div class="navbar-end">
            {% if user.is_authenticated %}
            <a href="{% url 'accounts:notificacoes' %}"
               class="icon-btn position-relative"
               aria-label="Notificações"
               title="Notificações">
                <i class="bi bi-bell" aria-hidden="true"></i>
                {% if notificacoes_nao_lidas > 0 %}
                <span class="position-absolute" style="top:2px;right:2px;width:0.5rem;height:0.5rem;background:var(--color-error);border-radius:50%;border:2px solid var(--color-bg-navbar);" aria-hidden="true"></span>
                {% endif %}
            </a>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Entrar</a>
            <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Registar</a>
            {% endif %}
        </div>
    </div>
</nav>
