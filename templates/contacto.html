{% extends 'base.html' %}
{% block title %}Contacto{% endblock %}
{% block content %}
<div class="container py-6">
    <div class="text-center mb-6">
        <h1 class="h1">Contacto</h1>
        <p class="text-muted">Tens alguma dúvida ou sugestão? Fala connosco.</p>
    </div>
    <div class="row justify-content-center g-4">
        <div class="col-sm-6 col-lg-5">
            <div class="card">
                <div class="card-body">
                    <h2 class="h3 mb-4">Envia-nos uma mensagem</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="form-label" for="nome">Nome</label>
                            <input type="text" name="nome" id="nome" class="form-input" required placeholder="O teu nome">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="email_contacto">Email</label>
                            <input type="email" name="email" id="email_contacto" class="form-input" required placeholder="email@exemplo.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="assunto">Assunto</label>
                            <input type="text" name="assunto" id="assunto" class="form-input" required placeholder="Assunto da mensagem">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="mensagem">Mensagem</label>
                            <textarea name="mensagem" id="mensagem" class="form-textarea" rows="4" required placeholder="A tua mensagem..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar Mensagem</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-4">
            <div class="card">
                <div class="card-body">
                    <h2 class="h3 mb-4">Outros Contactos</h2>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="icon-btn" style="cursor:default;color:var(--color-primary);"><i class="bi bi-envelope" aria-hidden="true"></i></div>
                        <div>
                            <div class="text-sm fw-medium">Email</div>
                            <a href="mailto:info@voluntariadolocal.pt" class="text-sm">info@voluntariadolocal.pt</a>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="icon-btn" style="cursor:default;color:var(--color-primary);"><i class="bi bi-telephone" aria-hidden="true"></i></div>
                        <div>
                            <div class="text-sm fw-medium">Telefone</div>
                            <a href="tel:+351210000000" class="text-sm">+351 210 000 000</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
