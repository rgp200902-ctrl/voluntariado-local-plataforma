<div class="empty-state{% if class %} {{ class }}{% endif %}">
    {% if icon %}
    <div class="empty-state-icon" aria-hidden="true">
        <i class="bi {{ icon }}" style="font-size:3rem;"></i>
    </div>
    {% endif %}
    <h3 class="empty-state-title">{{ title }}</h3>
    {% if description %}
    <p class="empty-state-description">{{ description }}</p>
    {% endif %}
    {% if action_url and action_label %}
    <div class="empty-state-actions">
        <a href="{{ action_url }}" class="btn btn-primary btn-sm">{{ action_label }}</a>
        {% if secondary_url and secondary_label %}
        <a href="{{ secondary_url }}" class="btn btn-outline-secondary btn-sm">{{ secondary_label }}</a>
        {% endif %}
    </div>
    {% endif %}
</div>
