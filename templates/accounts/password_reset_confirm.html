{% extends 'base.html' %}
{% block title %}Nova Palavra-passe{% endblock %}
{% block content %}
<div class="container py-6">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5">
            <div class="card">
                <div class="card-body">
                    {% if validlink %}
                    <h1 class="h2 text-center mb-5">Definir Nova Palavra-passe</h1>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="form-label" for="password">Nova palavra-passe</label>
                            <input type="password" name="password" id="password" class="form-input" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="password_confirm">Confirmar palavra-passe</label>
                            <input type="password" name="password_confirm" id="password_confirm" class="form-input" required autocomplete="new-password" placeholder="Repete a palavra-passe">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Alterar Palavra-passe</button>
                    </form>
                    {% else %}
                    <div class="text-center py-4">
                        <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--color-warning);" aria-hidden="true"></i>
                        <h2 class="h3 mt-3">Link inválido</h2>
                        <p class="text-sm text-muted mb-4">O link de recuperação é inválido ou já expirou.</p>
                        <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary">Pedir Novo Link</a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
