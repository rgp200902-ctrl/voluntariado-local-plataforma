{% extends 'base.html' %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="fw-bold text-center mb-4">Entrar na Plataforma</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <small>Ainda não tens conta? <a href="{% url 'accounts:register' %}">Regista-te</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
