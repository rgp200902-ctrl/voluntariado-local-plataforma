{% extends 'base.html' %}
{% block title %}Recuperar Palavra-passe{% endblock %}
{% block content %}
<div class="container py-6">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5">
            <div class="card">
                <div class="card-body">
                    <h1 class="h2 text-center mb-5">Recuperar Palavra-passe</h1>
                    <p class="text-sm text-muted text-center mb-5">Introduz o teu email e enviaremos um link de recuperação.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" name="email" id="email" class="form-input" required autocomplete="email" placeholder="email@exemplo.com">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar Link</button>
                    </form>
                    <div class="text-center mt-4">
                        <a href="{% url 'accounts:login' %}" class="text-sm">Voltar ao login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
