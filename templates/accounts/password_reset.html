{% extends 'base.html' %}
{% block title %}Recuperar Palavra-Passe{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="fw-bold text-center mb-2">Recuperar Palavra-Passe</h3>
                    <p class="text-muted text-center mb-4">Introduz o teu email para receber uma nova palavra-passe</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="O teu email" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Enviar Nova Palavra-Passe</button>
                    </form>
                    <div class="text-center mt-3">
                        <small><a href="{% url 'accounts:login' %}">Voltar ao login</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
