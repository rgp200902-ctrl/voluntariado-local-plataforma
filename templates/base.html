<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <meta name="description" content="Plataforma de Voluntariado Local - Conectamos instituições locais com voluntários dedicados.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Voluntariado">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>{% block title %}Plataforma de Voluntariado Local{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <script>
        (function(){
            var theme = localStorage.getItem('theme') || 'light';
            if(theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar para conteúdo principal</a>

    {% include 'navbar.html' %}

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <main id="main-content" role="main">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <script>
        // Dark mode toggle
        (function(){
            var toggle = document.getElementById('darkModeToggle');
            if(toggle) {
                function setIcon(){
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    toggle.innerHTML = isDark
                        ? '<i class="bi bi-sun-fill" aria-hidden="true"></i>'
                        : '<i class="bi bi-moon-fill" aria-hidden="true"></i>';
                    toggle.setAttribute('aria-label', isDark ? 'Modo Claro' : 'Modo Escuro');
                }
                setIcon();
                toggle.addEventListener('click', function(){
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if(isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                    }
                    setIcon();
                });
            }
        })();

        // Mobile sidebar
        (function(){
            var toggle = document.getElementById('sidebarToggle');
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if(toggle && sidebar && overlay) {
                function openSidebar() {
                    sidebar.classList.add('open');
                    overlay.classList.add('open');
                    document.body.classList.add('overflow-hidden');
                    toggle.setAttribute('aria-expanded', 'true');
                }
                function closeSidebar() {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('open');
                    document.body.classList.remove('overflow-hidden');
                    toggle.setAttribute('aria-expanded', 'false');
                }
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if(sidebar.classList.contains('open')) closeSidebar();
                    else openSidebar();
                });
                overlay.addEventListener('click', closeSidebar);
                document.addEventListener('keydown', function(e) {
                    if(e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
                });
            }
        })();

        // Dropdown menus
        (function(){
            document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var menu = this.nextElementSibling;
                    if(menu && menu.classList.contains('dropdown-menu')) {
                        var isOpen = menu.classList.contains('open');
                        document.querySelectorAll('.dropdown-menu.open').forEach(function(m) {
                            m.classList.remove('open');
                        });
                        if(!isOpen) menu.classList.add('open');
                    }
                });
            });
            document.addEventListener('click', function() {
                document.querySelectorAll('.dropdown-menu.open').forEach(function(m) {
                    m.classList.remove('open');
                });
            });
        })();

        // Toasts
        (function(){
            var messages = [
                {% if messages %}
                {% for message in messages %}
                { text: '{{ message|escapejs }}', type: '{{ message.tags|default:"info" }}' },
                {% endfor %}
                {% endif %}
            ];
            var container = document.getElementById('toast-container');
            if(container && messages.length > 0) {
                messages.forEach(function(msg) {
                    var toast = document.createElement('div');
                    toast.className = 'toast toast-' + msg.type;
                    var iconMap = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill' };
                    var icon = iconMap[msg.type] || iconMap.info;
                    toast.innerHTML = '<i class="bi ' + icon + ' toast-icon" aria-hidden="true"></i><span>' + msg.text + '</span>';
                    container.appendChild(toast);
                    setTimeout(function() { toast.remove(); }, 5000);
                });
            }
        })();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(function(){});
        }
    </script>
</body>
</html>
